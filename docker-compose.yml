version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: face_attendance_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    volumes:
      - .:/app

  postgres:
    image: postgres:17
    container_name: face_attendance_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:8

    container_name: face_attendance_redis

    ports:
      - "6379:6379"

    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: face_attendance_minio
    environment:
      - MINIO_ROOT_USER=moragon
      - MINIO_ROOT_PASSWORD=moragon1234
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
