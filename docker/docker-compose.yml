name: face-attendance

services:
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile

    container_name: face_attendance_api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    volumes:
      - ../:/app
      - ~/.insightface:/home/appuser/.insightface
    command: sh -c "python scripts/db_ready.py && alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:17
    container_name: face_attendance_postgres
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8
    container_name: face_attendance_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: face_attendance_minio
    environment:
      MINIO_ROOT_USER: moragon
      MINIO_ROOT_PASSWORD: moragon1234
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
